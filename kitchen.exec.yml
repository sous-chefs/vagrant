---
driver:
  name: exec

transport:
  name: exec

provisioner:
  chef_omnibus_install: false
  sudo: true

platforms:
  - name: macos-latest
  - name: windows-latest

suites:
  - name: mac
    run_list:
      - recipe[test::default]
    includes:
      - macos-latest
    verifier:
      inspec_tests:
        - path: test/integration/mac

  - name: windows
    run_list:
      - recipe[wintest::default]
    includes:
      - windows-latest
    verifier:
      inspec_tests:
        - path: test/integration/windows

  - name: windows_location
    run_list:
      - recipe[wintest::windows_location]
    includes:
      - windows-latest
    verifier:
      inspec_tests:
        - path: test/integration/windows_location
