---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  chef_license: accept-no-persist
  multiple_converge: 2
  enforce_idempotency: true
  deprecations_as_errors: true
  retry_on_exit_code:
    - 35
  max_retries: 5
  wait_for_retry: 90

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: centos-stream-10
  - name: debian-12
  - name: debian-13
  - name: fedora-latest
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-run_lists:
  default: &default_run_list
    - recipe[test::default]
  generic: &generic_run_list
    - recipe[test::generic]
  uninstall: &uninstall_run_list
    - recipe[test::default]
    - recipe[test::uninstall]
  generic_uninstall: &generic_uninstall_run_list
    - recipe[test::generic]
    - recipe[test::genericuninstall]

x-attributes:
  appimage: &appimage_attributes
    vagrant:
      appimage: true

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  generic: &generic_verifier
    inspec_tests:
      - path: test/integration/generic
  uninstall: &uninstall_verifier
    inspec_tests:
      - path: test/integration/uninstall
  generic_uninstall: &generic_uninstall_verifier
    inspec_tests:
      - path: test/integration/generic_uninstall

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

  - name: generic
    run_list: *generic_run_list
    attributes: *appimage_attributes
    verifier: *generic_verifier

  - name: uninstall
    run_list: *uninstall_run_list
    verifier: *uninstall_verifier
    provisioner:
      multiple_converge: 1
      enforce_idempotency: false

  - name: generic_uninstall
    run_list: *generic_uninstall_run_list
    attributes: *appimage_attributes
    verifier: *generic_uninstall_verifier
    provisioner:
      multiple_converge: 1
      enforce_idempotency: false
